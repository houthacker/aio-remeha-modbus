name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Permissions for default token
permissions:
  contents: read
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.14]

    steps:
      - name: Create releaser-bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set PY env
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Install uv and dependencies
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run pytest
        id: run_pytest
        run: |
          uv run pytest --cov-report=term-missing --junitxml=${{ github.workspace }}/junit-coverage.xml --cov=aio_remeha_modbus | tee ${{ github.workspace }}/pytest-coverage.txt
      - name: Check for test failures
        if: ${{ failure() }}
        run: |
          echo ${{ steps.run_pytest.outcome }}
          exit 1

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            ${{ github.workspace }}/junit-coverage.xml
            ${{ github.workspace }}/pytest-coverage.txt
          token: ${{ steps.app-token.outputs.token }}
